<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#37474F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40" />
    <line x1="0" y1="80" x2="900" y2="80" />
    <line x1="0" y1="120" x2="900" y2="120" />
    <line x1="0" y1="160" x2="900" y2="160" />
    <line x1="150" y1="0" x2="150" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="450" y1="0" x2="450" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="750" y1="0" x2="750" y2="200" />
  </g>

  <!-- Magnifying glass icon -->
  <g transform="translate(100, 100)" filter="url(#glow)">
    <!-- Glass circle -->
    <circle cx="0" cy="-8" r="28" fill="none" stroke="url(#accent)" stroke-width="4" />
    <!-- Handle -->
    <line x1="20" y1="12" x2="38" y2="30" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" />
    <!-- Search lines inside glass -->
    <line x1="-12" y1="-16" x2="12" y2="-16" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round" opacity="0.5" />
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round" opacity="0.5" />
    <line x1="-12" y1="0" x2="6" y2="0" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  </g>

  <!-- Title -->
  <text x="190" y="92" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ECEFF1" letter-spacing="1">
    BuscaPaginasBlancas
  </text>

  <!-- Subtitle -->
  <text x="190" y="128" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#90A4AE" letter-spacing="0.5">
    OSINT tool for Spanish white pages directory extraction
  </text>

  <!-- Accent line -->
  <rect x="190" y="140" width="80" height="3" rx="1.5" fill="url(#accent)" />

  <!-- Corner decorations -->
  <rect x="20" y="20" width="30" height="2" rx="1" fill="#4FC3F7" opacity="0.3" />
  <rect x="20" y="20" width="2" height="30" rx="1" fill="#4FC3F7" opacity="0.3" />
  <rect x="850" y="178" width="30" height="2" rx="1" fill="#4FC3F7" opacity="0.3" />
  <rect x="878" y="150" width="2" height="30" rx="1" fill="#4FC3F7" opacity="0.3" />
</svg>
